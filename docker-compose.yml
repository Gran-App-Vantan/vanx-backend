services:
  app:
    build: ./
    volumes:
      - .:/workdir
      - ./laravel_app/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    ports:
      - 8777:8000

  db:
    image: mysql:8.3
    volumes:
      - ./laravel_app/mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: dev
    ports:
      - 3377:3306